rules:
  # Bronze
  action-setup:
    status: exempt
    comment: Integration registers no custom service actions in v0.1.
  appropriate-polling:
    status: exempt
    comment: |
      iot_class is local_push: the coordinator holds a persistent TCP
      socket and processes spontaneous CMD_STATUS pushes via
      async_set_updated_data. The 30 s DataUpdateCoordinator poll is a
      heartbeat/fallback rather than the primary state path.
  brands:
    status: done
    comment: |
      Brand assets ship locally under custom_components/poolex_silverline/brand/
      (icon.png 256x256, icon@2x.png 512x512, logo.png 512x256, logo@2x.png
      1024x512). HA >= 2026.3 serves these via the brands proxy without a PR
      to home-assistant/brands.
  common-modules: done
  config-flow: done
  config-flow-test-coverage: done
  dependency-transparency: done
  docs-actions:
    status: exempt
    comment: Integration registers no custom service actions in v0.1.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup: done
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  action-exceptions:
    status: exempt
    comment: No custom service actions registered.
  config-entry-unloading: done
  docs-configuration-parameters:
    status: exempt
    comment: No options flow in v0.1.
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow: done
  test-coverage: done

  # Gold
  devices: done
  diagnostics: done
  # Option A: kept as `done` because the integration genuinely auto-discovers
  # devices on the LAN. UDP-broadcast is not a Core-supported discovery channel
  # (zeroconf/SSDP/DHCP/Bluetooth/USB), but it is the canonical Tuya-LAN
  # mechanism used by tinytuya, tuya-local, LocalTuya, and others. The block
  # comments below document this so a reviewer can judge the claim on its merits.
  discovery:
    status: done
    comment: |
      Implemented as SOURCE_INTEGRATION_DISCOVERY triggered by a background
      UDP-broadcast listener on the Tuya discovery port (UDP/6667). Standard
      zeroconf/DHCP discovery isn't available because the WBR3 module
      doesn't advertise via either channel; UDP-broadcast is the canonical
      Tuya-LAN discovery mechanism (mirrored by tinytuya and tuya-local).
  discovery-update-info:
    status: done
    comment: |
      The same UDP listener detects IP changes. The discovery loop tracks
      the last-seen IP per device_id, so a broadcast on a new IP re-fires
      the integration_discovery step instead of being deduped away.
      async_step_integration_discovery then calls
      _abort_if_unique_id_configured(updates={CONF_HOST: ip}) to atomically
      rewrite the entry's host. Before any rewrite, _verify_host opens a
      short-lived encrypted session against the new IP under the stored
      local_key — only the genuine device can respond, which blocks a LAN
      attacker who minted a spoofed UDP broadcast (the Tuya discovery key
      is public). Regression test: test_init.test_discovery_loop_suppresses_duplicate_ip_but_refires_on_change.
  docs-data-update: done
  docs-examples: done
  docs-known-limitations: done
  docs-supported-devices: done
  docs-supported-functions: done
  docs-troubleshooting: done
  docs-use-cases: done
  dynamic-devices:
    status: exempt
    comment: Each config entry corresponds to exactly one heat pump.
  entity-category: done
  entity-device-class: done
  entity-disabled-by-default: done
  entity-translations: done
  exception-translations: done
  icon-translations: done
  reconfiguration-flow: done
  repair-issues: done
  stale-devices:
    status: exempt
    comment: Each config entry corresponds to exactly one heat pump.

  # Platinum
  async-dependency: done
  inject-websession:
    status: exempt
    comment: |
      The Tuya v3.3 local protocol is a raw TCP stream over port 6668, not HTTP,
      so an `aiohttp.ClientSession` is categorically irrelevant — there is no
      websession to inject. The persistent socket carries per-frame AES-128-ECB
      cipher state keyed on the device's `local_key` plus a monotonic sequence
      counter; that state is device-scoped and cannot be shared across
      integrations. The heartbeat loop, reader task, and reconnect-with-backoff
      machinery are all bound to that single socket, so there is no separable
      session lifecycle that Home Assistant could own on our behalf.
  strict-typing: done
