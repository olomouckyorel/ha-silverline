name: Publish pysilverline to PyPI

on:
  push:
    tags:
      - "pysilverline-v*.*.*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: pysilverline
        run: |
          python - <<'PY'
          import pathlib
          import sys
          import tomllib

          version = tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"]
          expected = f"refs/tags/pysilverline-v{version}"
          actual = "${{ github.ref }}"
          if actual != expected:
              print(f"tag/package version mismatch: {actual} != {expected}", file=sys.stderr)
              sys.exit(1)
          PY

      - name: Install build backend
        run: python -m pip install --upgrade build

      - name: Build distribution
        working-directory: pysilverline
        run: python -m build

      - name: Upload distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: pysilverline-dist
          path: pysilverline/dist/*
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download distribution artifact
        uses: actions/download-artifact@v4
        with:
          name: pysilverline-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
