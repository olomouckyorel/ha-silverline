name: Tests
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  pysilverline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install pysilverline
        working-directory: pysilverline
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
      - name: Run pysilverline tests
        working-directory: pysilverline
        run: pytest tests/ -q

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ./pysilverline
          # pytest-homeassistant-custom-component ships a new release daily
          # pinned to the matching homeassistant version. Without an exact
          # pin, CI can install a different HA than the snapshot was
          # generated against and test_entity_inventory_snapshot breaks on
          # internal registry shape drift (e.g. aliases stored as set in
          # 2026.5.3 vs list[AliasEntry] in 2026.5.4). Bumping this pin
          # requires regenerating tests/snapshots/test_sensor.ambr against
          # the new HA via `pytest --snapshot-update`.
          pip install pytest pytest-asyncio pytest-cov \
            pytest-homeassistant-custom-component==0.13.333 syrupy
      - name: Run integration tests with coverage
        run: |
          pytest tests/ \
            --cov=custom_components.poolex_silverline \
            --cov-report=term-missing \
            --cov-fail-under=95

  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ./pysilverline
          pip install mypy homeassistant
      - name: mypy --strict (pysilverline)
        working-directory: pysilverline
        run: python -m mypy --strict src/pysilverline
      - name: mypy --strict (integration)
        run: python -m mypy --strict custom_components/poolex_silverline
